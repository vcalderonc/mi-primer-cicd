# ============================================
# PIPELINE DE CI - Ingeniería de Software II
# ============================================

name: Pipeline CI - Tests Automatizados/DevSecOps de VALENTINA CALDERÒN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ejecutar-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test

analisis-seguridad:
    runs-on: ubuntu-latest
    needs: ejecutar-tests        # ← Espera que los tests pasen primero
    permissions:
      security-events: write     # ← Permiso para escribir alertas de seguridad
      contents: read

    steps:
      - name: Obtener el código
        uses: actions/checkout@v4

      - name: Inicializar CodeQL        # ← Prepara el motor de análisis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript         # ← Le decimos que analice JavaScript

      - name: Ejecutar análisis CodeQL  # ← Escanea todo el código
        uses: github/codeql-action/analyze@v3